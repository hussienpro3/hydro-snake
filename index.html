<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة السنيك - Hydro Snake</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #1a1a1a; color: white; font-family: Arial, sans-serif; overflow: hidden; }
        canvas { border: 3px solid #4CAF50; background-color: #000; max-width: 90vw; max-height: 50vh; }
        .score { font-size: 24px; margin-bottom: 10px; }
        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .btn { width: 60px; height: 60px; background: #4CAF50; border: none; border-radius: 10px; color: white; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        .btn:active { background: #45a049; transform: scale(0.9); }
        .up { grid-column: 2; }
        .left { grid-column: 1; }
        .down { grid-column: 2; }
        .right { grid-column: 3; }
    </style>
</head>
<body>
    <div class="score">السكور: <span id="scoreVal">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    
    <div class="controls-grid">
        <button class="btn up" onclick="setDir('UP')">↑</button>
        <button class="btn left" onclick="setDir('LEFT')">←</button>
        <button class="btn down" onclick="setDir('DOWN')">↓</button>
        <button class="btn right" onclick="setDir('RIGHT')">→</button>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        let box = 20; let score = 0;
        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
        let d;

        function setDir(dir) {
            if(dir == "LEFT" && d != "RIGHT") d = "LEFT";
            else if(dir == "UP" && d != "DOWN") d = "UP";
            else if(dir == "RIGHT" && d != "LEFT") d = "RIGHT";
            else if(dir == "DOWN" && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#4CAF50" : "#81C784";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "red"; ctx.fillRect(food.x, food.y, box, box);
            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if( d == "LEFT") snakeX -= box; if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box; if( d == "DOWN") snakeY += box;
            if(snakeX == food.x && snakeY == food.y) {
                score++; scoreElement.innerHTML = score;
                food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
            } else { snake.pop(); }
            let newHead = { x: snakeX, y: snakeY };
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game); alert("انتهت اللعبة! السكور: " + score); location.reload();
            }
            snake.unshift(newHead);
        }
        function collision(head, array) {
            for(let i = 0; i < array.length; i++) { if(head.x == array[i].x && head.y == array[i].y) return true; }
            return false;
        }
        let game = setInterval(draw, 150);
    </script>
</body>
</html>
