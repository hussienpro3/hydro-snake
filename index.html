<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro Snake - النسخة المطورة</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%); color: white; font-family: 'Arial', sans-serif; overflow: hidden; }
        canvas { border: 5px solid #4CAF50; border-radius: 15px; background-color: #000; box-shadow: 0 0 30px rgba(76, 175, 80, 0.4); max-width: 90vw; max-height: 50vh; }
        .score { font-size: 28px; font-weight: bold; margin-bottom: 15px; color: #4CAF50; text-shadow: 2px 2px #000; }
        .controls-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }
        .btn { width: 70px; height: 70px; background: linear-gradient(145deg, #4CAF50, #45a049); border: none; border-radius: 50%; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px #2e7d32; touch-action: manipulation; }
        .btn:active { box-shadow: 0 2px #2e7d32; transform: translateY(3px); }
        .up { grid-column: 2; } .left { grid-column: 1; } .down { grid-column: 2; } .right { grid-column: 3; }
    </style>
</head>
<body>
    <div class="score">🍎 النقاط: <span id="scoreVal">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    
    <div class="controls-grid">
        <button class="btn up" onclick="setDir('UP')">↑</button>
        <button class="btn left" onclick="setDir('LEFT')">←</button>
        <button class="btn down" onclick="setDir('DOWN')">↓</button>
        <button class="btn right" onclick="setDir('RIGHT')">→</button>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        let box = 20; let score = 0;
        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
        let d;

        function setDir(dir) {
            if(dir == "LEFT" && d != "RIGHT") d = "LEFT";
            else if(dir == "UP" && d != "DOWN") d = "UP";
            else if(dir == "RIGHT" && d != "LEFT") d = "RIGHT";
            else if(dir == "DOWN" && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // رسم التفاحة (دائرة حمراء بلمعة)
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "white"; // لمعة التفاحة
            ctx.fillRect(food.x + 12, food.y + 5, 4, 4);

            // رسم الحية
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#4CAF50" : "#a2d149"; // الرأس أغمق من الجسم
                ctx.beginPath();
                ctx.roundRect(snake[i].x, snake[i].y, box-2, box-2, 5); // جسم مستدير الزوايا
                ctx.fill();
                
                if(i == 0) { // إضافة عيون للرأس
                    ctx.fillStyle = "black";
                    ctx.fillRect(snake[i].x + 4, snake[i].y + 4, 4, 4);
                    ctx.fillRect(snake[i].x + 12, snake[i].y + 4, 4, 4);
                }
            }

            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if( d == "LEFT") snakeX -= box; if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box; if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++; scoreElement.innerHTML = score;
                food = { x: Math.floor(Math.random() * 19) * box, y: Math.floor(Math.random() * 19) * box };
            } else { snake.pop(); }

            let newHead = { x: snakeX, y: snakeY };
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game); alert("خسرت! السكور: " + score); location.reload();
            }
            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) { if(head.x == array[i].x && head.y == array[i].y) return true; }
            return false;
        }
        let game = setInterval(draw, 120);
    </script>
</body>
</html>
