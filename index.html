<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro Snake - النسخة الأسطورية الكاملة</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .stats { display: flex; gap: 15px; font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        canvas { border: 4px solid #4CAF50; border-radius: 12px; background-color: #000; max-width: 95vw; max-height: 45vh; box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); }
        #joystick-container { width: 110px; height: 110px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; position: relative; margin-top: 15px; border: 2px solid #00f2ff; touch-action: none; }
        #joystick-knob { width: 45px; height: 45px; background: #00f2ff; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #00f2ff; }
        .active-powers { font-size: 14px; margin-top: 5px; color: #00f2ff; height: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="stats">
        <span style="color: #ffcc00;">🍎: <span id="scoreVal">0</span></span>
        <span style="color: #00f2ff;">🏆: <span id="highScoreVal">0</span></span>
    </div>
    <div id="status" class="active-powers"></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    <div id="joystick-container"><div id="joystick-knob"></div></div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const highScoreElement = document.getElementById("highScoreVal");
        const statusDiv = document.getElementById("status");
        
        let box = 20; let score = 0; let redCount = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreElement.innerHTML = highScore;

        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: 5 * box, y: 5 * box, type: 'red' };
        let powerUp = null; // {x, y, type: 'shield' | 'slow' | 'magnet'}
        let obstacles = []; // الحواجز
        let hasShield = false; let isSlow = false; let hasMagnet = false;
        let d; let gameSpeed = 160; let gameLoop;

        const container = document.getElementById('joystick-container');
        const knob = document.getElementById('joystick-knob');
        let startX, startY;

        container.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; });
        container.addEventListener('touchmove', e => {
            e.preventDefault();
            let dx = e.touches[0].clientX - startX; let dy = e.touches[0].clientY - startY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 20 && d != "LEFT") d = "RIGHT"; else if (dx < -20 && d != "RIGHT") d = "LEFT";
            } else {
                if (dy > 20 && d != "UP") d = "DOWN"; else if (dy < -20 && d != "DOWN") d = "UP";
            }
            knob.style.transform = `translate(calc(-50% + ${Math.max(-25, Math.min(25, dx))}px), calc(-50% + ${Math.max(-25, Math.min(25, dy))}px))`;
        });
        container.addEventListener('touchend', () => knob.style.transform = `translate(-50%, -50%)`);

        function spawnPowerUp() {
            const types = ['shield', 'slow', 'magnet'];
            powerUp = {
                x: Math.floor(Math.random()*19)*box,
                y: Math.floor(Math.random()*19)*box,
                type: types[Math.floor(Math.random()*types.length)]
            };
            setTimeout(() => powerUp = null, 8000); 
        }

        // إضافة حاجز جديد
        function spawnObstacle() {
            let obs = {
                x: Math.floor(Math.random()*19)*box,
                y: Math.floor(Math.random()*19)*box
            };
            // التأكد أن الحاجز لا يظهر فوق رأس الحية أو التفاحة
            if(obs.x !== snake[0].x && obs.y !== snake[0].y && obs.x !== food.x && obs.y !== food.y) {
                obstacles.push(obs);
            }
        }

        function drawGrid() {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)"; // خطوط شبكة خفيفة جداً
            for(let i=0; i<canvas.width; i+=box) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=box) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        }

        function draw() {
            ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid(); // رسم الخلفية

            // المغناطيس يسحب التفاح
            if(hasMagnet) {
                let dist = Math.hypot(snake[0].x - food.x, snake[0].y - food.y);
                if(dist < box * 4) { food.x = snake[0].x; food.y = snake[0].y; }
            }

            // رسم الطعام
            ctx.fillStyle = (food.type === 'gold') ? "#ffd700" : "#ff3131";
            ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.arc(food.x+box/2, food.y+box/2, 8, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            
            // رسم الباور أب
            if(powerUp) {
                let colors = {shield: '#00f2ff', slow: '#00ff00', magnet: '#ff00ff'};
                let icons = {shield: '🛡️', slow: '⏳', magnet: '🧲'};
                ctx.fillStyle = colors[powerUp.type]; ctx.beginPath(); ctx.arc(powerUp.x+box/2, powerUp.y+box/2, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.fillText(icons[powerUp.type], powerUp.x+3, powerUp.y+15);
            }

            // رسم الحواجز (الصخور)
            ctx.fillStyle = "#666"; // لون الصخور رمادي
            obstacles.forEach(obs => {
                ctx.beginPath(); ctx.roundRect(obs.x, obs.y, box-2, box-2, 5); ctx.fill();
                // إضافة شكل صخرة بسيط داخل المربع
                ctx.fillStyle = "#444"; ctx.fillRect(obs.x+4, obs.y+4, box-10, box-10);
                ctx.fillStyle = "#666"; 
            });

            // رسم الحية
            snake.forEach((p, i) => {
                ctx.fillStyle = (i == 0) ? (hasShield ? "#00f2ff" : "#4CAF50") : "#a2d149";
                ctx.beginPath(); ctx.roundRect(p.x, p.y, box-2, box-2, 6); ctx.fill();
            });

            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if(d == "LEFT") snakeX -= box; if(d == "UP") snakeY -= box;
            if(d == "RIGHT") snakeX += box; if(d == "DOWN") snakeY += box;

            // أكل الطعام
            if(snakeX == food.x && snakeY == food.y) {
                if(navigator.vibrate) navigator.vibrate(40);
                score++; scoreElement.innerHTML = score;
                redCount++; if(food.type == 'gold') { score += 3; redCount = 0; }
                if(redCount >= 3) { food.type = 'gold'; } else { food.type = 'red'; }
                
                // إضافة حاجز جديد كل 10 نقاط
                if(score % 10 === 0 && score > 0) spawnObstacle();
                
                food.x = Math.floor(Math.random()*19)*box; food.y = Math.floor(Math.random()*19)*box;
                if(Math.random() < 0.25) spawnPowerUp(); // زيادة احتمالية ظهور الباور أب قليلاً
                
            } else if(powerUp && snakeX == powerUp.x && snakeY == powerUp.y) {
                applyPower(powerUp.type); powerUp = null;
            } else { snake.pop(); }

            let newHead = { x: snakeX, y: snakeY };

            // الاصطدام
            // إضافة التحقق من صدم الحواجز (الصخور)
            let hitObstacle = obstacles.some(obs => obs.x == snakeX && obs.y == snakeY);

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake) || hitObstacle) {
                if(hasShield) { 
                    hasShield = false; statusDiv.innerText = ""; 
                    if(hitObstacle) { // الدرع يحميك من صدمة الحاجز مرة واحدة
                        if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                        return; // منع الموت
                    }
                    return; 
                }
                clearInterval(gameLoop);
                if(score > highScore) localStorage.setItem("snakeHighScore", score);
                alert("انتهت اللعبة! سكورك: " + score); location.reload();
            }
            snake.unshift(newHead);
        }

        function applyPower(type) {
            if(navigator.vibrate) navigator.vibrate(100);
            if(type === 'shield') { hasShield = true; statusDiv.innerText = "🛡️ الدرع نِشط"; }
            if(type === 'slow') { 
                isSlow = true; statusDiv.innerText = "⏳ الوقت بطيء";
                clearInterval(gameLoop); gameLoop = setInterval(draw, 250);
                setTimeout(() => { isSlow = false; statusDiv.innerText = ""; clearInterval(gameLoop); gameLoop = setInterval(draw, 140); }, 7000);
            }
            if(type === 'magnet') { 
                hasMagnet = true; statusDiv.innerText = "🧲 المغناطيس نِشط";
                setTimeout(() => { hasMagnet = false; statusDiv.innerText = ""; }, 8000);
            }
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) { if(head.x == array[i].x && head.y == array[i].y) return true; }
            return false;
        }
        gameLoop = setInterval(draw, 140);
    </script>
</body>
</html>
